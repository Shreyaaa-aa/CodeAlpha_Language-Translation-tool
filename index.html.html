<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Translation Tool</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>🌐 Language Translation Tool</h1>

    <!-- Language selectors -->
    <div class="lang-row">
      <div class="lang-box">
        <label for="sourceLang">From</label>
        <select id="sourceLang">
          <option value="en">English</option>
          <option value="hi">Hindi</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="ja">Japanese</option>
          <option value="zh">Chinese</option>
          <option value="ar">Arabic</option>
          <option value="ru">Russian</option>
          <option value="pt">Portuguese</option>
        </select>
      </div>

      <button id="swapBtn" title="Swap languages">⇄</button>

      <div class="lang-box">
        <label for="targetLang">To</label>
        <select id="targetLang">
          <option value="hi">Hindi</option>
          <option value="en" selected>English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="ja">Japanese</option>
          <option value="zh">Chinese</option>
          <option value="ar">Arabic</option>
          <option value="ru">Russian</option>
          <option value="pt">Portuguese</option>
        </select>
      </div>
    </div>

    <!-- Input -->
    <div class="text-box">
      <label for="inputText">Enter text</label>
      <textarea id="inputText" rows="4" placeholder="Type something to translate..."></textarea>
    </div>

    <button id="translateBtn">Translate</button>

    <!-- Output -->
    <div class="text-box output" id="outputContainer" style="display:none;">
      <label>Translation</label>
      <p id="outputText"></p>
      <div class="action-row">
        <button id="speakBtn">🔊 Listen</button>
        <button id="copyBtn">📋 Copy</button>
      </div>
    </div>

    <p id="statusMsg"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
